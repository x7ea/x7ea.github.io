<!doctype html>
<html>
    <head>
        <title>アナキスト同盟</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta http-equiv="Content-Type" content="text/html;charset=UTF-8" />

        <meta property="og:type" content="article" />
        <meta property="og:title" content="アナキスト同盟" />
        <meta property="og:description" content="総破壊だッ！" />
        <meta property="og:url" content="https://anarchism.jp/" />
        <meta property="og:image" content="https://anarchism.jp/flag.png" />
    </head>

    <body>
        <header>
            <h1>アナキスト同盟</h1>
        </header>

        <main>
            <ol>
                <li><a href="./manifesto.md"></a></li>
                <li><a href="./wherefrom.md"></a></li>
            </ol>
        </main>

        <footer>
            <p>
                (a) Anti-Copyrights 2026, Japan Anarchist League - JAL. All
                resources shared
            </p>
        </footer>
    </body>

    <style>
        @import url("https://fonts.googleapis.com/css2?family=M+PLUS+1p");

        body {
            margin: 0;
            padding: 0;
            font-family: "M PLUS 1p", monospace;
            background-color: whitesmoke;
            header {
                text-align: center;
                color: white;
                font-size: 30px;
                padding: 15px;
                margin: 0;
                margin-bottom: 10%;
                background-image: url("./flag.png");
                background-repeat: no-repeat;
                background-size: 100% 100%;
            }
            main {
                margin: 0 auto;
                max-width: 800px;
                ol {
                    list-style: none;
                    padding-left: 0;
                    padding: 10px;
                    li {
                        text-align: left;
                        font-weight: bold;
                        background-color: whitesmoke;
                        margin-bottom: 2em;
                        h1 {
                            margin-top: 0;
                            font-size: 25px;
                        }
                        div {
                            display: block;
                            padding-top: 0;
                            padding-bottom: 0;
                            h2 {
                                color: darkred;
                                font-size: 22px;
                            }
                            p {
                                font-size: 20px;
                                font-weight: normal;
                                letter-spacing: 0;
                                margin: 0;
                                padding: 0;
                                strong {
                                    letter-spacing: -0.022em;
                                }
                                & + & {
                                    margin-top: 10px;
                                }
                            }
                            p.meta {
                                color: grey;
                            }
                        }
                    }
                }
                a {
                    color: darkred;
                    text-decoration: none;
                    &:hover {
                        text-decoration: underline;
                    }
                }
            }
            footer {
                margin-top: 10%;
                background-color: lightgray;
                padding: 50px;
            }
            ::selection {
                background-color: rgba(0, 0, 0, 15%);
            }
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        async function main() {
            for (a of document.querySelectorAll("a")) {
                let txt = document.createElement("div");
                let data = await (await fetch(a.href)).text();
                let lines = data.split("\n");

                marked.use({ breaks: true, gfm: true });
                data = lines.slice(2).join("\n").trim();
                txt.innerHTML = marked.parse(data);

                let meta = lines[1].trim();
                if (meta.length != 0) {
                    let p = document.createElement("p");
                    [p.innerText, p.className] = [meta, "meta"];
                    txt.prepend(p);
                }

                a.parentElement.appendChild(txt);
                a.innerHTML = marked.parse(lines[0]);
            }
        }

        main();
    </script>
</html>
