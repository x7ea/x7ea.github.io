<!DOCTYPE html>
<html>
    <head>
        <title>アナキスト同盟</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta http-equiv="Content-Type" content="text/html;charset=UTF-8">

        <meta property="og:type" content="article" />
        <meta property="og:url" content="https://anarchism.jp/" />
        <meta property="og:title" content="アナキスト同盟｜総破壊だッ！" />
        <meta property="og:description" content="アナキスト同盟とは２６年３月に日本で結成された革命党であり、思想的にはプルードン・クロポトキン系という通俗的な潮流よりも千坂的なバクーニン主義の系譜上にあるが、極めて実存主義的であり「存在論的疎外論」を独自に構築するなど理論を重視してる" />
    </head>
    
    <body>
        <header>
            <h1>アナキスト同盟</h1>
        </header>
        
        <main>
            <ol>
                <li><a href="./manifesto.md"></a></li>
                <li><a href="./wherefrom.md"></a></li>
            </ol>
        </main>

        <footer>
            <p>(a) Anti-Copyrights 2026, Japan Anarchist League - JAL. All resources shared</p>
        </footer>
    </body>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=M+PLUS+1p');

        body {
            margin: 0; padding: 0;
            font-family: "M PLUS 1p", monospace;
            background-color: whitesmoke;
            header {
                text-align: center;
                padding: 10px; margin: 0; margin-bottom: 10%;
                color: white; background-color: black;
                font-size: 30px;
            }
            main {
                margin: 0 auto; 
                max-width: 800px;
                font-size: 20px;
                ol {
                    padding-left: 2vw; 
                    list-style: none;
                    li {
                        text-align: left;
                        font-size: 25px;
                        font-weight: bold;
                        div {
                            display: block;
                            border-left: solid 1px grey;
                            padding: 1vw; margin: 1vw;
                            padding-top: 0; padding-bottom: 0;
                            margin-bottom: 2vw;
                            p {
                                font-size: 18px;
                                font-weight: normal;
                                margin: 0; padding: 0;
                                strong {
                                    letter-spacing: -0.02em; 
                                }
                                & + & {
                                    margin-top: 10px; 
                                }
                            }
                        }
                    }
                }   
                h1 {
                    font-size: 25px;
                }
                h2 {
                    color: darkred;
                    font-size: 22px;
                }
                p.meta {
                    color: gray;
                }
                a {
                    color: darkred;
                    text-decoration: none;
                    &:hover {
                        text-decoration: underline; 
                    }
                }
            }
            footer {
                margin-top: 10%;
                background-color: lightgray;
                padding: 50px;
            }
            ::selection {
                background-color: rgba(0, 0, 0, 15%);
            }
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        async function main() {
            for (a of document.querySelectorAll("a")) {
                let txt = document.createElement("div");
                let data = await (await fetch(a.href)).text();
                let lines = data.split('\n');

                marked.use({ breaks: true, gfm: true });
                data = lines.slice(2).join('\n').trim();
                txt.innerHTML = marked.parse(data);

                let meta = lines[1].trim();
                if (meta.length != 0) {
                    let p = document.createElement("p");
                    [p.innerText, p.className] = [meta, "meta"];
                    txt.prepend(p);
                }

                a.parentElement.appendChild(txt)
                a.innerHTML = marked.parse(lines[0]);
            }
        }

        main()
    </script>
</html>
